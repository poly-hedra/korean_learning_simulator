# Korean Learning Simulator CI 워크플로우
#
# 이 워크플로우는 코드가 push되거나 PR이 생성될 때 실행됩니다.
# 코드 품질 검사, 단위 테스트, PR 코멘트, AI 코드 리뷰를 수행합니다.
#
# 주요 Job:
#   1. lint: Ruff를 사용한 코드 품질 검사
#   2. test: pytest를 사용한 단위 테스트 (lint 성공 시 실행)
#   3. comment: PR에 테스트 결과 코멘트 (항상 실행)
#   4. ai-review: AI가 변경사항을 분석하고 PR에 코멘트
#
# 필요한 GitHub Secrets:
#   - UPSTAGE_API_KEY: 테스트 및 AI 리뷰용 LLM API 키
#   - SUPABASE_URL: Supabase 프로젝트 URL
#   - SUPABASE_KEY: Supabase API 키

name: Korean Learning Simulator CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  # Job 1: Lint (코드 품질)
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff (lint)
        run: uv run ruff check app/ tests/ --output-format=github

      - name: Run Ruff (format)
        run: uv run ruff format app/ tests/ --check

  # Job 2: Test (단위 테스트)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          UPSTAGE_BASE_URL: ${{ secrets.UPSTAGE_BASE_URL }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: uv run pytest tests/ -v --tb=short

  # Job 3: Comment (PR 코멘트)
  comment:
    name: Report Status
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [lint, test]
    permissions:
      pull-requests: write
    steps:
      - name: Post Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          # 이모지 설정
          if [ "$LINT_RESULT" == "success" ]; then LINT_ICON="✅"; else LINT_ICON="❌"; fi
          if [ "$TEST_RESULT" == "success" ]; then TEST_ICON="✅"; else TEST_ICON="❌"; fi
          if [ "$TEST_RESULT" == "skipped" ]; then TEST_ICON="⚪"; fi

          # 코멘트 내용 작성
          echo "### 🛡️ Korean Learning Simulator CI Report" > status_report.md
          echo "" >> status_report.md
          echo "| Category | Status |" >> status_report.md
          echo "|----------|--------|" >> status_report.md
          echo "| **Lint** | $LINT_ICON $LINT_RESULT |" >> status_report.md
          echo "| **Test** | $TEST_ICON $TEST_RESULT |" >> status_report.md
          echo "" >> status_report.md

          if [ "$LINT_RESULT" != "success" ] || [ "$TEST_RESULT" == "failure" ]; then
             echo "⚠️ **테스트가 실패했습니다.** 로그를 확인해주세요." >> status_report.md
             EXIT_CODE=1
          else
             echo "🎉 **모든 테스트를 통과했습니다!**" >> status_report.md
             EXIT_CODE=0
          fi

          # PR 코멘트 전송
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file status_report.md

          # 실패 시 워크플로우도 실패 처리
          exit $EXIT_CODE

  # Job 4: AI Code Review
  ai-review:
    name: AI Review
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run AI Reviewer
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 스크립트 실행
          REVIEW=$(uv run python scripts/ai_reviewer.py)

          # gh CLI로 코멘트 달기
          echo "$REVIEW" > review_content.txt
          gh pr comment ${{ github.event.pull_request.number }} --body-file review_content.txt
