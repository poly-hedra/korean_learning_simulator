# Docker Compose 설정
# 로컬 개발 및 Production 배포용 컨테이너 설정
#
# 사용법:
#   docker-compose up --build      # 로컬 개발
#   docker-compose up -d           # 백그라운드 실행
#   docker-compose logs -f         # 로그 확인
#   docker-compose down            # 종료

services:
  korean:
    # GHCR 이미지
    image: ${KOREAN_IMAGE:-korean-learning:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korean-learning

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "8000:8000"

    # 환경변수 설정
    # .env 파일에서 로드 + 컨테이너 전용 설정
    environment:
      - UPSTAGE_API_KEY=${UPSTAGE_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=false
      # ===== LLMOps 1강: LiteLLM =====
      - USE_LITELLM=${USE_LITELLM:-true}
      # ===== LLMOps 2강: 체크포인터 =====
      - ENABLE_CHECKPOINTER=${ENABLE_CHECKPOINTER:-true}
      - CHECKPOINTER_TYPE=${CHECKPOINTER_TYPE:-postgres}
      # ===== LLMOps 2강: 비용 관리 =====
      - ENABLE_COST_TRACKING=${ENABLE_COST_TRACKING:-true}
      - DAILY_COST_LIMIT=${DAILY_COST_LIMIT:-10.0}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS:-3000}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      # ===== LLMOps 3강 : Lanfuse =====
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}

    # 헬스체크 (Dockerfile에 정의된 것 사용)
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 컨테이너 재시작 정책 : 비정상 종료 시 자동 재시작
    restart: unless-stopped
